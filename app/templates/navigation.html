<nav class="navbar navbar-expand-md navbar-dark bg-dark">
  <a class="navbar-brand" href="{{ url_for('home_page') }}">Новости</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item {% if request.endpoint == 'home_page' %}active{% endif %}">
        <a class="nav-link" href="{{ url_for('home_page') }}">Новости</a>
      </li>
      <li class="nav-item {% if request.endpoint == 'add_news' %}active{% endif %}">
        <a class="nav-link" href="{{ url_for('add_news') }}">Добавить новость</a>
      </li>
    </ul>
  </div>
  {% if not current_user.is_authenticated %}
    <a class="btn btn-outline-primary mr-2" href="{{ url_for('login') }}">Bход</a>
    <a class="btn btn-primary" href="{{ url_for('registration') }}">Регистрация</a>
  {% else %}
    <span class="navbar-text">Пользователь: {{ current_user.name }}</span>
    <a class="btn btn-primary" href="{{ url_for('logout') }}">Выход</a>
  {% endif %}
</nav>
